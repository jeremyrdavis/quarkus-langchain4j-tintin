# ============================================
# OpenAI Configuration
# ============================================
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.moderation-model.model-name=omni-moderation-latest
quarkus.langchain4j.openai.timeout=60s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ============================================
# EasyRAG Configuration (Tintin PDF)
# ============================================
quarkus.langchain4j.easy-rag.path=tintin-docs
quarkus.langchain4j.easy-rag.max-segment-size=200
quarkus.langchain4j.easy-rag.max-overlap-size=50
quarkus.langchain4j.easy-rag.max-results=5

# ============================================
# Chat Memory
# ============================================
quarkus.langchain4j.chat-memory.memory-window.max-messages=20

# ============================================
# Guardrails
# ============================================
quarkus.langchain4j.guardrails.max-retries=3

# ============================================
# Observability
# ============================================
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.enabled=true

# ============================================
# Response schema (for structured output)
# ============================================
quarkus.langchain4j.response-schema=true
